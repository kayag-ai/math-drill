<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaya's Math Attack - Subtraction Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff0f9; touch-action: manipulation; overflow: hidden; }
        #status-bar { width: 90%; display: flex; justify-content: space-between; font-size: 1.2rem; color: #555; margin-bottom: 10px; max-width: 400px; }
        #question { font-size: 6rem; font-weight: bold; color: #c0392b; margin-bottom: 20px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 400px; }
        .key { 
            padding: 25px; font-size: 2.5rem; font-weight: bold; cursor: pointer; 
            background: white; color: #c0392b; border: 3px solid #c0392b; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: #c0392b; color: white; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 249, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box; }
        #start-btn { padding: 20px 40px; font-size: 2rem; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 15px; box-shadow: 0 4px #c0392b; margin-top: 20px; }
        #start-btn:active { box-shadow: none; transform: translateY(4px); }
        
        /* ホームボタンのスタイル */
        .home-link { display: inline-block; margin-top: 20px; padding: 10px 20px; font-size: 1.2rem; color: #7f8c8d; text-decoration: none; border: 2px solid #bdc3c7; border-radius: 10px; }
        
        #result-display { font-size: 1.5rem; color: #2c3e50; line-height: 1.6; }
        .character-icon { font-size: 5rem; margin-bottom: 10px; }
        .comment { font-weight: bold; color: #c0392b; margin-top: 10px; }
        
        #debug-btn { position: fixed; bottom: 10px; right: 10px; padding: 8px 14px; font-size: 1.5rem; background: none; border: none; cursor: pointer; opacity: 0.4; color: #42445A; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="result-display">くりさがり 36もん<br>ぜんぶとけるかな？</div>
        <button id="start-btn">スタート！</button>
        <a href="https://kayag-ai.github.io/home-edu-apps/" class="home-link">ホームにもどる</a>
    </div>

    <div id="status-bar">
        <div id="timerDisplay">タイム: 0.0秒</div>
        <div id="progressDisplay"></div>
    </div>
    <div id="question">?-?</div>
    
    <div class="keypad">
        <div class="key" onclick="handleInput(2)">2</div>
        <div class="key" onclick="handleInput(3)">3</div>
        <div class="key" onclick="handleInput(4)">4</div>
        <div class="key" onclick="handleInput(5)">5</div>
        <div class="key" onclick="handleInput(6)">6</div>
        <div class="key" onclick="handleInput(7)">7</div>
        <div class="key" onclick="handleInput(8)">8</div>
        <div class="key" onclick="handleInput(9)">9</div>
    </div>

    <button id="debug-btn">🔧</button>

    <script>
        let problems = [];
        let currentProblem = null;
        let startTime = 0;
        let timerInterval = null;
        let totalAttempts = 0;
        let firstTryCorrect = 0;
        let currentProblemAttempted = false;
        let debugTimer = null;

        const questionEl = document.getElementById('question');
        const timerEl = document.getElementById('timerDisplay');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const resultDisplay = document.getElementById('result-display');
        const debugBtn = document.getElementById('debug-btn');

        const startPress = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            debugTimer = setTimeout(debugSkipWithBranch, 2000);
        };
        const endPress = () => clearTimeout(debugTimer);

        debugBtn.addEventListener('mousedown', startPress);
        debugBtn.addEventListener('touchstart', startPress, {passive: false});
        debugBtn.addEventListener('mouseup', endPress);
        debugBtn.addEventListener('mouseleave', endPress);
        debugBtn.addEventListener('touchend', endPress);

        function initProblems() {
            problems = [];
            for (let total = 11; total <= 18; total++) {
                const onesPlace = total % 10;
                for (let subtrahend = onesPlace + 1; subtrahend <= 9; subtrahend++) {
                    problems.push({ q: `${total} - ${subtrahend}`, a: total - subtrahend });
                }
            }
            totalAttempts = 0;
            firstTryCorrect = 0;
        }

        function speakThenDo(text, callback) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            let done = false;
            const proceed = () => { if (!done) { done = true; callback(); } };
            uttr.onend = proceed;
            setTimeout(proceed, 1500);
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(uttr);
        }

        function askNextQuestion() {
            if (problems.length === 0) {
                finishGame();
                return;
            }
            currentProblemAttempted = false;
            const index = Math.floor(Math.random() * problems.length);
            currentProblem = problems[index];
            problems.splice(index, 1);
            questionEl.textContent = currentProblem.q;
            speakThenDo(currentProblem.q.replace('-', 'ひく') + 'は？', () => {});
        }

        function handleInput(num) {
            totalAttempts++;
            if (num === currentProblem.a) {
                if (!currentProblemAttempted) firstTryCorrect++;
                speakThenDo("せいかい！", askNextQuestion);
            } else {
                currentProblemAttempted = true;
                speakThenDo("ちがうよ", () => {});
            }
        }

        function debugSkipWithBranch() {
            const mode = prompt("デバッグランク選択:\n1:ユニコーン\n2:フェニックス\n3:ウサギ\n4:ヒヨコ");
            if (!mode) return;
            const now = performance.now();
            problems = [];
            totalAttempts = 36;
            switch(mode) {
                case "1": startTime = now - 10000; firstTryCorrect = 36; break;
                case "2": startTime = now - 300000; firstTryCorrect = 36; break;
                case "3": startTime = now - 10000; firstTryCorrect = 20; break;
                case "4": startTime = now - 300000; firstTryCorrect = 20; break;
                default: return;
            }
            finishGame();
            overlay.style.display = 'flex';
        }

        function finishGame() {
            clearInterval(timerInterval);
            const totalTime = parseFloat(((performance.now() - startTime) / 1000).toFixed(1));
            const accuracy = (firstTryCorrect / 36) * 100;
            const isFast = totalTime <= 144;
            const isAccurate = accuracy >= 80;

            let char, name, comment, colors;
            if (isFast && isAccurate) {
                char = "🦄"; name = "ユニコーン";
                comment = "しんじられないスピードとせいかくさ！きみは すうじの まほうつかいだね！";
                colors = ['#ffccff', '#ccffff', '#ffffcc'];
            } else if (!isFast && isAccurate) {
                char = "🐦‍🔥"; name = "フェニックス";
                comment = "じっくり かんがえて、ひとつも まちがえない つよさを かんじるよ。かっこいい！";
                colors = ['#ff4500', '#ff8c00', '#ffd700'];
            } else if (isFast && !isAccurate) {
                char = "🐰"; name = "ウサギ";
                comment = "とっても はやいね！つぎは、ちょっとだけ きをつけて ボタンをおすと もっとすごくなるよ！";
                colors = ['#ffffff', '#ffc0cb', '#f0f0f0'];
            } else {
                char = "🐣"; name = "ヒヨコ";
                comment = "さいごまで がんばったね！ひとつずつ、ゆっくりで だいじょうぶ。いっしょに つよくなろう！";
                colors = ['#ffff00', '#ffa500', '#ffffff'];
            }

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors });

            resultDisplay.innerHTML = `
                <div class="character-icon">${char}</div>
                <div>ランク：<strong>${name}</strong></div>
                <div style="font-size: 1rem; margin-top: 10px;">
                    タイム: ${totalTime}秒<br>せい答りつ: ${accuracy.toFixed(0)}%
                </div>
                <div class="comment">${comment}</div>
            `;
            startBtn.textContent = "もういっかい！";
            overlay.style.display = 'flex';
        }

        startBtn.onclick = () => {
            initProblems();
            overlay.style.display = 'none';
            startTime = performance.now();
            timerInterval = setInterval(() => {
                timerEl.textContent = `タイム: ${((performance.now() - startTime) / 1000).toFixed(1)}秒`;
            }, 100);
            askNextQuestion();
        };
    </script>
</body>
</html>
